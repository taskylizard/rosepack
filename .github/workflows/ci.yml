name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1.15.0
        with:
          node-version-file: .node-version
          cache: true
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Restore Vite Task cache
        id: vite-task-cache
        uses: actions/cache/restore@v6.1.0
        with:
          path: node_modules/.vite/task-cache
          key: vite-task-${{ runner.os }}-${{ runner.arch }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            vite-task-${{ runner.os }}-${{ runner.arch }}-

      - name: Check
        run: vp run -r check

      - name: Test
        run: vp run -r test

      - name: Build
        run: vp run -r build

      - name: Save Vite Task cache
        if: success()
        uses: actions/cache/save@v6.1.0
        with:
          path: node_modules/.vite/task-cache
          key: ${{ steps.vite-task-cache.outputs.cache-primary-key }}
